<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSocket Client</title>
  <link rel="stylesheet" href="./client/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./client/config.js" defer></script>
</head>

<body class="bg-gray-100 text-gray-900">
  <div class="container mx-auto p-6">
    <h1 class="text-3xl font-semibold mb-4 text-center">WebSocket Client</h1>

    <div class="flex justify-center gap-4 mb-6">
      <button id="pauseBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        Pause
      </button>
      <button id="resumeBtn" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
        Play
      </button>
      <button id="exportBtn" class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">
        Exporter
      </button>
      <label for="importFile" class="px-4 py-2 bg-orange-600 text-white rounded hover:bg-orange-700 cursor-pointer">
        Importer
      </label>
      <input type="file" id="importFile" class="hidden">
    </div>

    <div class="wrapper">
      <canvas height="100" width="300" style="object-fit:contain;" id="arretCanvas"></canvas>
      <canvas height="100" width="300" style="object-fit:contain;" id="entityCanvas"></canvas>
    </div>

    <!-- Section des contrôles -->
    <div class="flex items-center justify-center mb-4 gap-2">
      <!-- Bouton Backward -->
      <button class="p-2 bg-gray-200 rounded hover:bg-gray-300" id="backward">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-700" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>

      <!-- Input Number avec le séparateur et le nombre -->
      <div class="flex items-center">
        <input type="number" class="border border-gray-300 rounded p-2 w-16 text-center" min="0" id="inputNumber">
        <span class="mx-2 text-gray-700">/</span>
        <span id="totalNumber" class="text-gray-700">0</span>
      </div>

      <!-- Bouton Forward -->
      <button class="p-2 bg-gray-200 rounded hover:bg-gray-300" id="forward">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-gray-700" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
      </button>
    </div>

    <!-- Bouton "Voir la tick" -->
    <div class="flex justify-center mb-6">
      <button id="viewTickBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
        Voir la tick
      </button>
    </div>

    <div class="mb-4">
      <button id="toggleDebugBtn" class="px-3 py-1 bg-gray-300 text-gray-700 rounded hover:bg-gray-400 text-sm shadow">
        Afficher les informations de débogage
      </button>
      <div id="messages" class="hidden bg-gray-50 border border-gray-300 rounded shadow-md p-4 max-h-72 overflow-y-auto mt-2 transition-all duration-300 ease-in-out">
        <h2 class="text-base font-medium mb-2 text-gray-800">Messages de Debug</h2>
      </div>
    </div>



    <section id="config">
      <form id="configForm" class="space-y-6">
        <!-- Section Arrêts -->
        <div class="accordion-section">
          <button type="button"
            class="accordion-toggle bg-gray-200 w-full text-left p-4 rounded-t-md font-medium text-lg text-gray-700"
            onclick="toggleAccordion('arretsSection')">
            Arrêts
          </button>
          <div id="arretsSection" class="hidden-content p-4 bg-white border-b border-gray-300 rounded-b-md">
            <div id="arretsList"></div>
            <button type="button" onclick="addArret()"
              class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
              Ajouter un arrêt
            </button>
          </div>
        </div>

        <!-- Section Bus -->
        <div class="accordion-section">
          <button type="button"
            class="accordion-toggle bg-gray-200 w-full text-left p-4 rounded-t-md font-medium text-lg text-gray-700"
            onclick="toggleAccordion('busSection')">
            Bus
          </button>
          <div id="busSection" class="hidden-content p-4 bg-white border-b border-gray-300 rounded-b-md">
            <div id="busList"></div>
            <button type="button" onclick="addBus()"
              class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
              Ajouter un bus
            </button>
          </div>
        </div>

        <!-- Section Buses -->
        <div class="accordion-section">
          <button type="button"
            class="accordion-toggle bg-gray-200 w-full text-left p-4 rounded-t-md font-medium text-lg text-gray-700"
            onclick="toggleAccordion('busesSection')">
            Buses
          </button>
          <div id="busesSection" class="hidden-content p-4 bg-white border-b border-gray-300 rounded-b-md">
            <div id="busesList"></div>
            <button type="button" onclick="addBus()"
              class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
              Ajouter un parcours au bus
            </button>
          </div>
        </div>

        <!-- Section Routes -->
        <div class="accordion-section">
          <button type="button"
            class="accordion-toggle bg-gray-200 w-full text-left p-4 rounded-t-md font-medium text-lg text-gray-700"
            onclick="toggleAccordion('routesSection')">
            Routes
          </button>
          <div id="routesSection" class="hidden-content p-4 bg-white border-b border-gray-300 rounded-b-md">
            <div id="routesList"></div>
            <button type="button" onclick="addRoute()"
              class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
              Ajouter une route
            </button>
          </div>
        </div>

        <!-- Section Parcours -->
        <div class="accordion-section">
          <button type="button"
            class="accordion-toggle bg-gray-200 w-full text-left p-4 rounded-t-md font-medium text-lg text-gray-700"
            onclick="toggleAccordion('parcoursSection')">
            Parcours
          </button>
          <div id="parcoursSection" class="hidden-content p-4 bg-white border-b border-gray-300 rounded-b-md">
            <div id="parcoursList"></div>
            <button type="button" onclick="addParcours()"
              class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
              Ajouter un parcours
            </button>
          </div>
        </div>

        <!-- Section Passagers -->
        <div class="accordion-section">
          <button type="button"
            class="accordion-toggle bg-gray-200 w-full text-left p-4 rounded-t-md font-medium text-lg text-gray-700"
            onclick="toggleAccordion('peoplesSection')">
            Passagers
          </button>
          <div id="peoplesSection" class="hidden-content p-4 bg-white border-b border-gray-300 rounded-b-md">
            <div id="peoplesList"></div>
            <button type="button" onclick="addPerson()"
              class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
              Ajouter un passager
            </button>
          </div>
        </div>

        <div class="text-center mt-6">
          <button type="button" onclick="submitConfig()"
            class="px-6 py-3 bg-indigo-600 text-white rounded hover:bg-indigo-700">
            Envoyer la configuration
          </button>
        </div>
      </form>
    </section>
  </div>

  <!-- Pop-up Modal -->
  <div id="popupModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-10">
    <div class="bg-white rounded-lg shadow-lg p-6 max-w-md w-full">
      <h2 class="text-xl font-semibold mb-4" id="popup-h2"></h2>
      <p class="text-gray-700 mb-4" id="popup-message"></p>
      <div class="flex justify-end">
        <button id="closePopup" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">Fermer</button>
      </div>
    </div>
  </div>

  <!-- Popup Fin de l'univers -->
  <div id="universeEndModal"
    class="fixed inset-0 flex items-center justify-center bg-gray-800 bg-opacity-50 hidden z-10">
    <div class="bg-white p-6 rounded-lg shadow-lg text-center max-w-md w-full">
      <h2 class="text-2xl font-semibold mb-4">Fin de l'univers !</h2>
      <p id="universeEndMessage" class="text-lg">Univers terminé en <span id="tickCount"></span> ticks.</p>
      <button id="closeModalBtn"
        class="mt-4 px-4 py-2 bg-green-400 text-white rounded-full hover:bg-green-500 transition duration-200 transform hover:scale-105 shadow-md hover:shadow-lg">
        Fermer
      </button>
    </div>
  </div>

  <script src="./client/Arret.js"></script>
  <script src="./client/Bus.js"></script>
  <script src="./client/main.js"></script>
  <script>
    // Envoi de la configuration
    function submitConfig() {
      // Récupération des valeurs des champs
      const configData = {
        configuration: {
          arrets: {},
          bus: {},
          buses: {},
          routes: {},
          parcours: {},
          peoples: {},
        },
      };
      // Arrêts
      configData.configuration.arrets = {};
      document.querySelectorAll("#arretsList > div").forEach((div) => {
        const nom = div.querySelector(".arretNom").value;
        const routes = div.querySelector(".arretRoutes").value.split(", ");
        configData.configuration.arrets[nom] = { nom, routes };
      });

      // Bus
      configData.configuration.bus = {};
      document.querySelectorAll("#busList > div").forEach((div) => {
        const type = div.querySelector(".busType").value;
        const capacite = parseInt(div.querySelector(".busCapacite").value);
        const vitesseChargement = parseInt(
          div.querySelector(".busVitesseChargement").value
        );
        const vitesseDeplacement = parseInt(
          div.querySelector(".busVitesseDeplacement").value
        );
        configData.configuration.bus[type] = {
          type,
          "capacite-max": capacite,
          "vitesse-chargement": vitesseChargement,
          "vitesse-deplacement": vitesseDeplacement,
        };
      });

      // Buses
      configData.configuration.buses = [];
      document.querySelectorAll("#busesList > div").forEach((div) => {
        const type = div.querySelector(".busType").value;
        const parcours = div.querySelector(".busParcours").value;
        configData.configuration.buses.push({
          type: type,
          parcours: parcours,
        });
      });

      // Routes
      configData.configuration.routes = {};
      document.querySelectorAll("#routesList > div").forEach((div) => {
        const nom = div.querySelector(".routeNom").value;
        const arrets = div.querySelector(".routeArrets").value.split(", ");
        const distance = parseInt(div.querySelector(".routeDistance").value);
        configData.configuration.routes[nom] = { nom, arrets, distance };
      });

      // Parcours
      configData.configuration.parcours = {};
      document.querySelectorAll("#parcoursList > div").forEach((div) => {
        const nom = div.querySelector(".parcoursNom").value;
        const etapes = div.querySelector(".parcoursEtapes").value.split(", ");
        configData.configuration.parcours[nom] = etapes;
      });

      // Passagers
      configData.configuration.peoples = {};
      document.querySelectorAll("#peoplesList > div").forEach((div) => {
        const nom = div.querySelector(".personNom").value;
        const nombre = parseInt(div.querySelector(".personNombre").value);
        const aller = {
          depart: div.querySelector(".personAllerDepart").value,
          arrivee: div.querySelector(".personAllerArrivee").value,
          temps: parseInt(div.querySelector(".personAllerTemps").value),
        };
        const retour = {
          depart: div.querySelector(".personRetourDepart").value,
          arrivee: div.querySelector(".personRetourArrivee").value,
          temps: parseInt(div.querySelector(".personRetourTemps").value),
        };
        configData.configuration.peoples[nom] = {
          nom,
          nombre,
          aller,
          retour,
        };
      });

      socket.send(JSON.stringify(configData));
      setup(configData["configuration"]);
      //increment();
    }

    function decodeJSON(data) {
      for (const key in data.configuring) {
        if (typeof data.configuring[key] === "string") {
          data.configuring[key] = JSON.parse(data.configuring[key]);
        }
      }
    }

    const host = "ws://localhost:8080";
    const messagesDiv = document.getElementById("messages");
    const socket = new WebSocket(host);

    // Événements WebSocket
    socket.addEventListener("open", () => {
      console.log("Connected to the server");
      appendMessage("Connected to the server");
    });

    socket.addEventListener("message", (event) => {
      console.log("Message from server: ", event.data);
      appendMessage("Message from server: " + event.data);

      const data = JSON.parse(event.data);

      if (data.hasOwnProperty("configuring")) {
        const configData = data;
        decodeJSON(configData);
        populateForm(configData);
        showPopup('Configuration', 'Merci de configurer l\'application, puis cliquez sur "Envoyer la configuration".');
      } else if (data.hasOwnProperty("running-state")) {
        const runningState = data["running-state"];
        decodeJSON(runningState);
        document.getElementById("inputNumber").value = data['tick'];
        document.getElementById("totalNumber").textContent = data['tick'];    
        increment();    
      } else if (data.hasOwnProperty("state")) {
        const state = data["state"];
        decodeJSON(state);
        document.getElementById("inputNumber").value = data['state'];
        document.getElementById("totalNumber").textContent = data['on'];
        increment();
      } else if (data.hasOwnProperty("success")) {
        showUniverseEndModal(data['tick']);
        increment();
      } else if (data.hasOwnProperty("export")) {
        const a = document.createElement('a');
        a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(data.export);
        a.download = 'exportMan.json';
        a.click();
      } else if (data.hasOwnProperty("univers_end")) {
        showUniverseEndModal(data['tick']);
      }
    });

    socket.addEventListener("error", (error) => {
      console.error("WebSocket error: ", error);
      appendMessage("WebSocket error: " + error.message);
    });

    socket.addEventListener("close", () => {
      console.log("Disconnected from the server");
      appendMessage("Disconnected from the server");
    });

    document.getElementById("pauseBtn").addEventListener("click", () => {
      socket.send("pause");
      appendMessage("Sent: pause");
    });

    document.getElementById("resumeBtn").addEventListener("click", () => {
      socket.send("resume");
      appendMessage("Sent: resume");
    });

    // Fonction pour ajouter un message à la zone de messages
    function appendMessage(message) {
      const messageElement = document.createElement("div");
      messageElement.textContent = message;
      messagesDiv.appendChild(messageElement);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function populateForm(data) {
      // Arrêts
      for (const [nom, arret] of Object.entries(data.configuring.arrets)) {
        addArret(arret.nom, arret.routes.join(", "));
      }

      // Bus
      for (const [type, bus] of Object.entries(data.configuring.bus)) {
        addBus(
          bus.type,
          bus["capacite-max"],
          bus["vitesse-chargement"],
          bus["vitesse-deplacement"]
        );
      }

      // Buses
      for (const [no, conf] of Object.entries(data.configuring.buses)) {
        addBuses(conf.type, conf.parcours);
      }

      // Routes
      for (const [nom, route] of Object.entries(data.configuring.routes)) {
        addRoute(route.nom, route.arrets.join(", "), route.distance);
      }

      // Parcours
      for (const [nom, parcours] of Object.entries(
        data.configuring.parcours
      )) {
        addParcours(nom, parcours.join(", "));
      }

      // Passagers
      for (const [nom, person] of Object.entries(data.configuring.peoples)) {
        addPerson(person.nom, person.nombre, person.aller, person.retour);
      }
    }

    function showPopup(h2Message, message) {
      document.getElementById('popupModal').classList.remove('hidden');
      document.getElementById('popup-h2').textContent = h2Message;
      document.getElementById('popup-message').textContent = message;
    }

    document.getElementById('closePopup').addEventListener('click', function () {
      document.getElementById('popupModal').classList.add('hidden');
    });

    function showUniverseEndModal(tickCount) {
      document.getElementById('universeEndModal').classList.remove('hidden')
      document.getElementById('tickCount').textContent = tickCount;
    }

    document.getElementById('closeModalBtn').addEventListener('click', () => {
      document.getElementById('universeEndModal').classList.add('hidden');
    });

    document.getElementById('viewTickBtn').addEventListener('click', function () {
      socket.send(JSON.stringify({ "get_state": document.getElementById("inputNumber").value }));
      appendMessage('Sent: view-tick');
    });

    document.getElementById('backward').addEventListener('click', function () {
      const tick = parseInt(document.getElementById("inputNumber").value) - 1;
      if (tick >= 0) {
        socket.send(JSON.stringify({ "get_state": tick }));
        appendMessage('Sent: view-tick');
      } else {
        showPopup('Erreur', 'Vous ne pouvez pas aller en arrière de la première tick.');
      }
    });

    document.getElementById('forward').addEventListener('click', function () {
      const tick = parseInt(document.getElementById("inputNumber").value) + 1;
      socket.send(JSON.stringify({ "get_state": tick }));
      appendMessage('Sent: view-tick');
    });

    document.getElementById('inputNumber').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        document.getElementById('viewTickBtn').click();
      }
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      socket.send('export');
    });

    document.getElementById('importFile').addEventListener('change', (event) => {
      if (event.target.files.length > 0) {
        showPopup("Importation", "Attention, vous pourrez voir les données sur l'ensemble de la sauvegarde mais pas la continuer");
        const file = event.target.files[0];
        const reader = new FileReader();
        console.log("Là")
        reader.addEventListener('load', (event) => {
          const data = JSON.parse(event.target.result);
          decodeJSON(data);
          populateForm(data);
        });
      }
    });

    document.getElementById('toggleDebugBtn').addEventListener('click', () => {
      document.getElementById('messages').classList.toggle('hidden');
    });


  </script>
  <script type="module" src="./client/main.js"></script>
</body>

</html>
